<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Compose Message | VendorLink</title>

    <link rel="stylesheet"
          href="/style.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>VendorLink</h2>

        <ul>

            <li><a href="/dashboard">📊 Dashboard</a></li>

            <li><a href="/vendors">👥 Vendors</a></li>

            <li><a href="/purchaseOrders">📦 Purchase Orders</a></li>

            <li><a href="/performance">⭐ Performance</a></li>

            <li>
                <a href="/messages"
                   class="active">

                    💬 Messages

                </a>
            </li>

            <li><a href="/">🏠 Home</a></li>

            <li>
                <a href="#"
                   id="sidebarLogout">

                    🚪 Logout

                </a>
            </li>

        </ul>

    </aside>

    <!-- Main -->

    <main class="main-content">

        <div class="topbar">

            <h2 id="pageHeading">

                Compose Message

            </h2>

            <button
                id="logoutBtn"
                class="btn btn-danger">

                Logout

            </button>

        </div>

        <div class="content">

            <div class="form-card">

                <form id="messageForm">

                    <!-- Vendor -->

                    <div class="form-group">

                        <label>

                            Vendor

                        </label>

                        <select
                            id="vendor"
                            class="form-control"
                            required>

                            <option value="">

                                Select Vendor

                            </option>

                        </select>

                    </div>

                    <!-- Subject -->

                    <div class="form-group">

                        <label>

                            Subject

                        </label>

                        <input
                            type="text"
                            id="subject"
                            class="form-control"
                            placeholder="Enter subject"
                            required>

                    </div>

                    <!-- Priority -->

                    <div class="form-row">

                        <div class="form-group">

                            <label>

                                Priority

                            </label>

                            <select
                                id="priority"
                                class="form-control">

                                <option value="Low">

                                    Low

                                </option>

                                <option value="Medium">

                                    Medium

                                </option>

                                <option value="High">

                                    High

                                </option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>

                                Status

                            </label>

                            <select
                                id="status"
                                class="form-control">

                                <option value="Unread">

                                    Unread

                                </option>

                                <option value="Read">

                                    Read

                                </option>

                            </select>

                        </div>

                    </div>

                    <!-- Message -->

                    <div class="form-group">

                        <label>

                            Message

                        </label>

                        <textarea
                            id="message"
                            class="form-control"
                            rows="8"
                            placeholder="Type your message..."
                            required></textarea>



                           <!-- Action Buttons -->

                    <br>

                    <button
                        type="submit"
                        class="btn btn-success">

                        Send Message

                    </button>

                    <button
                        type="reset"
                        class="btn btn-warning">

                        Reset

                    </button>

                    <a
                        href="/messages"
                        class="btn btn-primary">

                        Back

                    </a>

                </form>

            </div>

        </div>

        <!-- Footer -->

        <footer class="footer">

            <p>

                © 2026 VendorLink - Vendor Management System

            </p>

        </footer>

    </main>

</div>

<script src="/common.js"></script>
<script src="/messages.js"></script>

</body>

</html>
