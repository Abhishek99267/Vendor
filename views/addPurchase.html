<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Purchase Order | VendorLink</title>

    <link rel="stylesheet"
          href="/style.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>VendorLink</h2>

        <ul>

            <li><a href="/dashboard">📊 Dashboard</a></li>

            <li><a href="/vendors">👥 Vendors</a></li>

            <li>
                <a href="/purchaseOrders"
                   class="active">
                    📦 Purchase Orders
                </a>
            </li>

            <li><a href="/performance">⭐ Performance</a></li>

            <li><a href="/messages">💬 Messages</a></li>

            <li><a href="/">🏠 Home</a></li>

            <li><a href="#" id="sidebarLogout">🚪 Logout</a></li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <div class="topbar">

            <h2 id="pageHeading">

                Create Purchase Order

            </h2>

            <button
                id="logoutBtn"
                class="btn btn-danger">

                Logout

            </button>

        </div>

        <div class="content">

            <div class="form-card">

                <form id="purchaseForm">

                    <!-- Row 1 -->

                    <div class="form-row">

                        <div class="form-group">

                            <label>

                                Purchase Order No.

                            </label>

                            <input
                                type="text"
                                id="poNumber"
                                class="form-control"
                                placeholder="PO-1001"
                                required>

                        </div>

                        <div class="form-group">

                            <label>

                                Vendor

                            </label>

                            <select
                                id="vendor"
                                class="form-control"
                                required>

                                <option value="">

                                    Select Vendor

                                </option>

                            </select>

                        </div>

                    </div>

                    <!-- Row 2 -->

                    <div class="form-row">

                        <div class="form-group">

                            <label>

                                Product Name

                            </label>

                            <input
                                type="text"
                                id="productName"
                                class="form-control"
                                required>

                        </div>

                        <div class="form-group">

                            <label>

                                Category

                            </label>

                            <select
                                id="category"
                                class="form-control">

                                <option>Electronics</option>
                                <option>Office Supplies</option>
                                <option>Furniture</option>
                                <option>IT Equipment</option>
                                <option>Raw Material</option>
                                <option>Other</option>

                            </select>

                        </div>

                    </div>

                    <!-- Row 3 -->

                    <div class="form-row">

                        <div class="form-group">

                            <label>

                                Quantity

                            </label>

                            <input
                                type="number"
                                id="quantity"
                                class="form-control"
                                min="1"
                                required>

                        </div>

                        <div class="form-group">

                            <label>

                                Unit Price (₹)

                            </label>

                            <input
                                type="number"
                                id="unitPrice"
                                class="form-control"
                                min="0"
                                required>

                        </div>

                    </div>


 
                               <!-- Row 4 -->

                    <div class="form-row">

                        <div class="form-group">

                            <label>

                                Total Amount (₹)

                            </label>

                            <input
                                type="number"
                                id="totalAmount"
                                class="form-control"
                                readonly>

                        </div>

                        <div class="form-group">

                            <label>

                                Order Status

                            </label>

                            <select
                                id="status"
                                class="form-control">

                                <option value="Pending">
                                    Pending
                                </option>

                                <option value="Approved">
                                    Approved
                                </option>

                                <option value="Delivered">
                                    Delivered
                                </option>

                                <option value="Cancelled">
                                    Cancelled
                                </option>

                            </select>

                        </div>

                    </div>

                    <!-- Row 5 -->

                    <div class="form-row">

                        <div class="form-group">

                            <label>

                                Order Date

                            </label>

                            <input
                                type="date"
                                id="orderDate"
                                class="form-control"
                                required>

                        </div>

                        <div class="form-group">

                            <label>

                                Expected Delivery Date

                            </label>

                            <input
                                type="date"
                                id="deliveryDate"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <!-- Notes -->

                    <div class="form-group">

                        <label>

                            Notes

                        </label>

                        <textarea
                            id="notes"
                            class="form-control"
                            rows="5"
                            placeholder="Additional notes about this purchase order"></textarea>

                    </div>

                    <br>

                    <button
                        type="submit"
                        class="btn btn-success">

                        Save Purchase Order

                    </button>

                    <button
                        type="reset"
                        class="btn btn-warning">

                        Reset

                    </button>

                    <a
                        href="/purchaseOrders"
                        class="btn btn-primary">

                        Back

                    </a>

                </form>

            </div>

        </div>

        <!-- Footer -->

        <footer class="footer">

            <p>

                © 2026 VendorLink - Vendor Management System

            </p>

        </footer>

    </main>

</div>
<script src="/common.js"></script>

<script src="/purchase.js"></script>

</body>

</html>
