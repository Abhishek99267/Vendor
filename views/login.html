<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>VendorLink | Login</title>

    <link rel="stylesheet"
          href="/style.css">

</head>

<body>

    <section class="auth-section">

        <div class="auth-box">

            <h2>VendorLink Login</h2>

            <form id="loginForm">

                <div class="form-group">

                    <label>Email Address</label>

                    <input
                        type="email"
                        id="email"
                        class="form-control"
                        placeholder="Enter your email"
                        required>

                </div>

                <div class="form-group">

                    <label>Password</label>

                    <div style="position:relative;">

                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            placeholder="Enter your password"
                            required>

                        <span
                            id="togglePassword"
                            style="
                                position:absolute;
                                right:15px;
                                top:50%;
                                transform:translateY(-50%);
                                cursor:pointer;
                                user-select:none;
                            ">
                            👁
                        </span>

                    </div>

                </div>

                <button
                    type="submit"
                    class="btn btn-primary"
                    style="width:100%;margin-top:15px;">

                    Login

                </button>

            </form>

            <div class="auth-footer">

                <p>

                    Don't have an account?

                    <a href="/register">

                        Register

                    </a>

                </p>

            </div>

        </div>

    </section>

    <script src="/common.js"></script>
    <script src="/login.js"></script>

</body>

</html>
