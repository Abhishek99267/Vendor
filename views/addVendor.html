<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Add Vendor | VendorLink</title>

    <link rel="stylesheet"
          href="/style.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

     
      <h2 id="pageHeading">

    Add New Vendor

</h2>

        <ul>

            <li>
                <a href="/dashboard">
                    📊 Dashboard
                </a>
            </li>

            <li>
                <a href="/vendors"
                   class="active">
                    👥 Vendors
                </a>
            </li>

            <li>
                <a href="/purchaseOrders">
                    📦 Purchase Orders
                </a>
            </li>

            <li>
                <a href="/performance">
                    ⭐ Performance
                </a>
            </li>

            <li>
                <a href="/messages">
                    💬 Messages
                </a>
            </li>

            <li>
                <a href="/">
                    🏠 Home
                </a>
            </li>

            <li>
                <a href="#"
                   id="sidebarLogout">
                    🚪 Logout
                </a>
            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <div class="topbar">

            <h2>

                Add New Vendor

            </h2>

            <button
                id="logoutBtn"
                class="btn btn-danger">

                Logout

            </button>

        </div>

        <div class="content">

            <div class="form-card">

                <form id="vendorForm">

                    <div class="form-row">

                        <div class="form-group">

                            <label>Vendor Name</label>

                            <input
                                type="text"
                                id="vendorName"
                                class="form-control"
                                required>

                        </div>

                        <div class="form-group">

                            <label>Company Name</label>

                            <input
                                type="text"
                                id="companyName"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="form-row">

                        <div class="form-group">

                            <label>Email</label>

                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                required>

                        </div>

                        <div class="form-group">

                            <label>Phone</label>

                            <input
                                type="text"
                                id="phone"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="form-row">

                        <div class="form-group">

                            <label>Address</label>

                            <input
                                type="text"
                                id="address"
                                class="form-control"
                                required>

                        </div>

                        <div class="form-group">

                            <label>City</label>

                            <input
                                type="text"
                                id="city"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="form-row">

                        <div class="form-group">

                            <label>State</label>

                            <input
                                type="text"
                                id="state"
                                class="form-control"
                                required>

                        </div>

                        <div class="form-group">

                            <label>Country</label>

                            <input
                                type="text"
                                id="country"
                                value="India"
                                class="form-control">

                        </div>

                    </div>

     
                    


                    <div class="form-row">

                        <div class="form-group">

                            <label>Pincode</label>

                            <input
                                type="text"
                                id="pincode"
                                class="form-control"
                                required>

                        </div>

                        <div class="form-group">

                            <label>GST Number</label>

                            <input
                                type="text"
                                id="gstNumber"
                                class="form-control"
                                required>

                        </div>

                    </div>

                    <div class="form-row">

                        <div class="form-group">

                            <label>Category</label>

                            <select
                                id="category"
                                class="form-control">

                                <option value="Raw Material">Raw Material</option>
                                <option value="Electronics">Electronics</option>
                                <option value="IT Services">IT Services</option>
                                <option value="Office Supplies">Office Supplies</option>
                                <option value="Furniture">Furniture</option>
                                <option value="Logistics">Logistics</option>
                                <option value="Manufacturing">Manufacturing</option>
                                <option value="Other">Other</option>

                            </select>

                        </div>

                        <div class="form-group">

                            <label>Status</label>

                            <select
                                id="status"
                                class="form-control">

                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                                <option value="Blocked">Blocked</option>

                            </select>

                        </div>

                    </div>

                    <div class="form-group">

                        <label>Notes</label>

                        <textarea
                            id="notes"
                            class="form-control"
                            rows="5"
                            placeholder="Enter additional notes about the vendor"></textarea>

                    </div>

                    <br>

                    <button
                        type="submit"
                        class="btn btn-success">

                        Save Vendor

                    </button>

                    <button
                        type="reset"
                        class="btn btn-warning">

                        Reset

                    </button>

                    <a
                        href="/vendors"
                        class="btn btn-primary">

                        Back

                    </a>

                </form>

            </div>

        </div>

        <footer class="footer">

            <p>

                © 2026 VendorLink - Vendor Management System

            </p>

        </footer>

    </main>

</div>
<script src="/common.js"></script>

<script src="/vendors.js"></script>

</body>

</html>
