<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Vendor Evaluation | VendorLink</title>

    <link rel="stylesheet"
          href="/style.css">

</head>

<body>

<div class="dashboard">

    <!-- Sidebar -->

    <aside class="sidebar">

        <h2>VendorLink</h2>

        <ul>

            <li><a href="/dashboard">📊 Dashboard</a></li>

            <li><a href="/vendors">👥 Vendors</a></li>

            <li><a href="/purchaseOrders">📦 Purchase Orders</a></li>

            <li>

                <a href="/performance"
                   class="active">

                    ⭐ Performance

                </a>

            </li>

            <li><a href="/messages">💬 Messages</a></li>

            <li><a href="/">🏠 Home</a></li>

            <li>

                <a href="#"
                   id="sidebarLogout">

                    🚪 Logout

                </a>

            </li>

        </ul>

    </aside>

    <!-- Main Content -->

    <main class="main-content">

        <div class="topbar">

            <h2 id="pageHeading">

                Vendor Evaluation

            </h2>

            <button
                id="logoutBtn"
                class="btn btn-danger">

                Logout

            </button>

        </div>

        <div class="content">

            <div class="form-card">

                <form id="performanceForm">

                    <!-- Vendor -->

                    <div class="form-group">

                        <label>

                            Vendor

                        </label>

                        <select
                            id="vendor"
                            class="form-control"
                            required>

                            <option value="">

                                Select Vendor

                            </option>

                        </select>

                    </div>

                    <!-- Scores -->

                    <div class="form-row">

                        <div class="form-group">

                            <label>

                                Quality Score

                            </label>

                            <input
                                type="number"
                                id="quality"
                                class="form-control"
                                min="1"
                                max="10"
                                required>

                        </div>

                        <div class="form-group">

                            <label>

                                Delivery Score

                            </label>

                            <input
                                type="number"
                                id="delivery"
                                class="form-control"
                                min="1"
                                max="10"
                                required>

                        </div>

                    </div>

                    <div class="form-row">

                        <div class="form-group">

                            <label>

                                Cost Score

                            </label>

                            <input
                                type="number"
                                id="cost"
                                class="form-control"
                                min="1"
                                max="10"
                                required>

                        </div>

                        <div class="form-group">

                            <label>

                                Communication Score

                            </label>

                            <input
                                type="number"
                                id="communication"
                                class="form-control"
                                min="1"
                                max="10"
                                required>

                        </div>

                    </div>

                       <!-- Overall Rating -->

                    <div class="form-row">

                        <div class="form-group">

                            <label>

                                Overall Rating

                            </label>

                            <input
                                type="number"
                                id="overall"
                                class="form-control"
                                readonly>

                        </div>

                    </div>

                    <!-- Comments -->

                    <div class="form-group">

                        <label>

                            Comments

                        </label>

                        <textarea
                            id="comments"
                            class="form-control"
                            rows="5"
                            placeholder="Write performance remarks..."></textarea>

                    </div>

                    <br>

                    <button
                        type="submit"
                        class="btn btn-success">

                        Save Evaluation

                    </button>

                    <button
                        type="reset"
                        class="btn btn-warning">

                        Reset

                    </button>

                    <a
                        href="/performance"
                        class="btn btn-primary">

                        Back

                    </a>

                </form>

            </div>

        </div>

        <!-- Footer -->

        <footer class="footer">

            <p>

                © 2026 VendorLink - Vendor Management System

            </p>

        </footer>

    </main>

</div>

<script src="/common.js"></script>
<script src="/performance.js"></script>

</body>

</html>
